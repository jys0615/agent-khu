name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend ─────────────────────────────────────────
      - name: Extract backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ─────────────────────────────────────────
      - name: Extract frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # job-level if 에서는 secrets 컨텍스트를 쓸 수 없으므로
  # 별도 check 잡에서 출력값으로 전달
  check-deploy:
    name: Check deploy conditions
    runs-on: ubuntu-latest
    needs: publish
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Check KUBECONFIG secret
        id: check
        env:
          KUBECONFIG_VAL: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -n "$KUBECONFIG_VAL" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "⚠️  KUBECONFIG secret not set — skipping K8s deploy"
          fi

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: check-deploy
    timeout-minutes: 15
    if: needs.check-deploy.outputs.should_deploy == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply K8s manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml

          # Secrets must be created manually on the cluster beforehand.
          # See: k8s/README.md for required secret names.

          kubectl apply -f k8s/postgres/
          kubectl apply -f k8s/redis/
          kubectl apply -f k8s/backend/
          kubectl apply -f k8s/frontend/
          kubectl apply -f k8s/ingress.yaml

      - name: Rollout restart (pull latest images)
        run: |
          kubectl rollout restart deployment/backend  -n agent-khu
          kubectl rollout restart deployment/frontend -n agent-khu

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend  -n agent-khu --timeout=120s
          kubectl rollout status deployment/frontend -n agent-khu --timeout=120s
